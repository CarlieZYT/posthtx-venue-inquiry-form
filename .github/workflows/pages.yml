name: Deploy preview to GitHub Pages

# Serves src/ as the site ROOT (no redirect hop), so deep links like
# /?venues=outpost,penthouse work natively with the query preserved.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./src           # publish the app folder as the site root
      - id: deployment
        uses: actions/deploy-pages@v4
